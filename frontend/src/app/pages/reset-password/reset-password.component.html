<div class="auth-sayfa">
  <div class="auth-kutu">
    <div class="auth-logo">
      <img src="/assets/images/logo.png" alt="MedUnit" />
    </div>
    <h2>Yeni Şifre Belirle</h2>
    <p class="aciklama">Hesabınız için yeni bir şifre oluşturun.</p>

    <div class="basari-mesaj" *ngIf="basari">
      <i class="fas fa-check-circle"></i> {{ basari }}
    </div>

    <div *ngIf="!basari">
      <div class="hata-mesaj" *ngIf="hata">✕ {{ hata }}</div>

      <div *ngIf="token">
        <div class="form-grup">
          <label>Yeni Şifre</label>
          <div class="input-ikon">
            <i class="fas fa-lock"></i>
            <input type="password" [(ngModel)]="yeniSifre"
                   placeholder="En az 6 karakter" />
          </div>
        </div>
        <div class="form-grup">
          <label>Yeni Şifre (Tekrar)</label>
          <div class="input-ikon">
            <i class="fas fa-lock"></i>
            <input type="password" [(ngModel)]="yeniSifreTekrar"
                   placeholder="Şifrenizi tekrarlayın"
                   (keyup.enter)="sifreYenile()" />
          </div>
        </div>
        <button class="btn-gonder" (click)="sifreYenile()" [disabled]="yukleniyor">
          {{ yukleniyor ? 'Güncelleniyor...' : 'Şifremi Güncelle' }}
        </button>
      </div>

      <p class="alt-link" *ngIf="!token">
        <a routerLink="/sifremi-unuttum">Şifre sıfırlama linkini yeniden talep et</a>
      </p>
    </div>
  </div>
</div>
