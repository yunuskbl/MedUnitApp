<div class="auth-sayfa">
  <div class="auth-kutu">
    <div class="auth-logo">
      <img src="/assets/images/logo.png" alt="MedUnit" />
    </div>
    <h2>Şifremi Unuttum</h2>
    <p class="aciklama">Email adresinizi girin, şifre sıfırlama linki gönderelim.</p>

    <div class="basari-mesaj" *ngIf="basari">
      <i class="fas fa-check-circle"></i> {{ basari }}
      <a routerLink="/" class="anasayfa-link">Ana sayfaya dön</a>
    </div>

    <div *ngIf="!basari">
      <div class="hata-mesaj" *ngIf="hata">✕ {{ hata }}</div>

      <div class="form-grup">
        <label>Email Adresiniz</label>
        <div class="input-ikon">
          <i class="fas fa-envelope"></i>
          <input type="email" [(ngModel)]="email" placeholder="ornek@email.com"
                 (keyup.enter)="gonder()" />
        </div>
      </div>

      <button class="btn-gonder" (click)="gonder()" [disabled]="yukleniyor">
        {{ yukleniyor ? 'Gönderiliyor...' : 'Link Gönder' }}
      </button>

      <p class="alt-link">
        Şifrenizi hatırladınız mı?
        <a routerLink="/">Giriş yapın</a>
      </p>
    </div>
  </div>
</div>
